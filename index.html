<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <link rel="stylesheet" href="estilos/style.css">
    <link rel="stylesheet" href="estilos/mobile-first.css">
</head>
<body>
    <main>
        <section id="login">
            <div id="photo">
        
            </div>
            <div id="forms">

                <h1>LOGIN</h1>
                <p>Seja bem-vindo(a) novamente. Faça login para acessar sua conta.</p>
                <form action="login.php" method="post" autocomplete="on">

                    <div class="field">
                    <span class="material-symbols-outlined">Mail</span>  
                    <input class="inputwidth" type="email" name="Email" id="iemail" required placeholder=" nome@exemplo.com " autocomplete="email" >
                    <label for="iemail" ></label>
                    </div>

                    <div class="field">
                        <span class="material-symbols-outlined">Key</span>
                        <input class="inputwidth" type="password" name="Password" id="ipassword" required minlength="8" maxlength="12" placeholder=" sua senha " autocomplete="current-password" >
                        <label for="ipassword"></label>
                    </div> 

                    <div class="container" >
                        <div>
                           <input class="cursor" type="checkbox" name="remember" id="iremember">
                            <label class="cursor" for="iremember">Lembre de mim</label> 
                        </div>
            
                        <div>
                            <a class="cursor" href="#">Esqueci a senha</a> 
                        </div>
                    </div>

                    <div>
                        <input class="buttoninput" type="submit" value="Entrar">
                    </div>
                    
                </form>
            </div>
        </section>
    </main>
</body>
</html>
